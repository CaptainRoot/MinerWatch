manifestVersion: 1
id: imlenti-minerwatch
category: bitcoin
name: MinerWatch
version: "1.19.2"
tagline: Real-time monitor for home Bitcoin miners
icon: https://raw.githubusercontent.com/imlenti/minerwatch-app-store/main/imlenti-minerwatch/icon.png
description: >-
  MinerWatch is a self-hosted, local-first dashboard for small Bitcoin
  mining setups (1–10 miners). It watches BitAxe and NerdQAxe (Gamma /
  Supra / Ultra / Max), Canaan Avalon Nano 3s & Avalon Q, and Braiins
  BMM 101 — all on the same LAN, with no cloud round-trips.


  Highlights:

  - Sub-second polling — see throttling and pool issues the moment they
    happen, not 15 minutes later.

  - Server-side PID auto-fan replicating the BitAxe firmware controller,
    so the dashboard can hold a target chip temperature even on miners
    whose firmware lacks a sane curve.

  - Web Push (VAPID) + Telegram bot alerts in parallel — temperature,
    offline, recovery, new best-share, and rare block-find events.

  - Block-find detection: when a share difficulty meets or exceeds the
    current network difficulty, you get a celebratory notification and
    a permanent trophy card in the dashboard.

  - Tiered metric retention (raw 48 h → 1-min 30 d → 1-h 2 y) so the
    SQLite database stays small while the history stays long.

  - LAN auto-discovery and MAC-pinned identity, so a DHCP IP change
    won't break a miner's history.


  AGPL-3.0 licensed. No telemetry, no accounts, no cloud — your data
  never leaves the LAN.


  MinerWatch is free and built independently. If it earns a place in your
  mining setup, star it on GitHub — that is how other home miners find
  it — or lend it some hashrate from the in-app Donate page.
releaseNotes: >-
  Installable from the MinerWatch Community App Store. Supports BitAxe,
  NerdQAxe, Canaan Avalon (Nano 3s and Q) and Braiins BMM 101. Polling at 5 s
  by default, server-side auto-fan PID, Web Push + Telegram alerts, block-find
  detection, tiered metric storage. Updates ship by bumping this version and
  the image tag.
developer: imlenti
website: https://github.com/imlenti/MinerWatch
dependencies: []
repo: https://github.com/imlenti/MinerWatch
support: https://github.com/imlenti/MinerWatch/issues
port: 8000
gallery:
  - https://raw.githubusercontent.com/imlenti/minerwatch-app-store/main/imlenti-minerwatch/1.png
  - https://raw.githubusercontent.com/imlenti/minerwatch-app-store/main/imlenti-minerwatch/2.png
  - https://raw.githubusercontent.com/imlenti/minerwatch-app-store/main/imlenti-minerwatch/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
# Desktop widgets. The endpoint host must be a compose service with a
# bridge-network IP (umbreld resolves it via docker inspect). `web` is
# host-networked, so we go through app_proxy, which listens on the
# manifest port and forwards to the host-bound web service.
widgets:
  - id: "fleet"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app_proxy:8000/api/widgets/fleet"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "4.78"
          subtext: "TH/s"
        - title: "Miners online"
          text: "4/4"
        - title: "Best share"
          text: "4.21"
          subtext: "G"
        - title: "Max temp"
          text: "61"
          subtext: "°C"
  - id: "miners"
    type: "list"
    refresh: "5s"
    endpoint: "app_proxy:8000/api/widgets/miners"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - subtext: "Lucky · Bitaxe Gamma"
          text: "1.21 TH/s · 58 °C"
        - subtext: "Garage · NerdQAxe++"
          text: "4.78 TH/s · 61 °C"
        - subtext: "Avalon Nano 3s"
          text: "🔴 Offline · 2 h"
submitter: imlenti
submission: https://github.com/imlenti/MinerWatch
