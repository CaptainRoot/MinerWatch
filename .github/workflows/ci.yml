name: CI

# Runs on every push to main and on pull requests targeting main.
# Manual `workflow_dispatch` is wired up too so a maintainer can
# rerun without waiting for a fresh push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run when a new commit is pushed to the same
# branch / PR — saves CI minutes on rapid push-fix-push cycles.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-and-import:
    name: Syntax check + import smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile every Python file
        # Catches syntax errors fast, no runtime side effects.
        run: |
          python -m py_compile \
            backend/__init__.py \
            backend/main.py \
            backend/db.py \
            backend/poller.py \
            backend/alerts.py \
            backend/auth.py \
            backend/auto_control.py \
            backend/config.py \
            backend/discovery.py \
            backend/miners/__init__.py \
            backend/miners/base.py \
            backend/miners/bitaxe.py \
            backend/miners/braiins.py \
            backend/miners/canaan.py \
            backend/miners/cgminer_client.py

      - name: Import the FastAPI app (smoke test)
        # Ensures every module loads cleanly together, including the
        # config module that reads config.example.yaml relative paths.
        # We don't start the server — just instantiate `app`.
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend.main import app
          paths = sorted({r.path for r in app.routes if getattr(r, 'path', None)})
          assert '/api/health' in paths, 'core route missing'
          assert '/api/fleet/best_difficulty' in paths, 'best-share route missing'
          print(f'OK: {len(paths)} routes registered')
          "

      - name: Smoke-test the SI difficulty parser
        # Catches regressions on the AxeOS / cgminer string formats
        # without needing real miners on the runner.
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend.miners.base import parse_si_difficulty as p
          cases = [
              ('4.29G', 4.29e9),
              ('2.15M', 2.15e6),
              ('512k', 512_000.0),
              (49224525, 49224525.0),
              (None, None),
              ('', None),
              ('foo', None),
          ]
          for inp, exp in cases:
              got = p(inp)
              if exp is None:
                  assert got is None, (inp, got)
              else:
                  assert abs(got - exp) < 1e-6, (inp, got, exp)
          print('parse_si_difficulty OK')
          "
