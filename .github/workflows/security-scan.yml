name: Security scan

# Dependency vulnerability scanning for the Python backend and the React
# frontend. This is a SIGNAL workflow: it reports known CVEs in our pinned
# dependencies but deliberately does not block merges or releases. The audit
# steps run with continue-on-error so a freshly disclosed CVE turns the step
# yellow (a visible annotation) without stopping unrelated work. Tighten to a
# hard fail once the existing backlog is cleared.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit requirements.txt
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --desc

  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit production dependencies
        continue-on-error: true
        run: npm audit --omit=dev
