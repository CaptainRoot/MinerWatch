name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
title: "[bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more we know
        upfront, the faster the fix lands. Please redact anything
        sensitive (real MAC addresses, public IPs, push subscription
        endpoints) before pasting logs.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: |
        After clicking "Scan network", the dashboard shows zero
        miners even though my Bitaxe is reachable at 192.168.1.42.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: |
        I expected the Bitaxe to be auto-discovered and added to
        the fleet.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Smallest setup that reliably shows the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MinerWatch version / commit
      description: Output of `git -C ~/MinerWatch rev-parse --short HEAD`
        (or the source archive version).
      placeholder: e.g. b57d1b8
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - macOS
        - Linux (Raspberry Pi)
        - Linux (other)
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python3 --version`
      placeholder: e.g. Python 3.11.7
    validations:
      required: true

  - type: dropdown
    id: miner-family
    attributes:
      label: Miner family involved
      multiple: true
      options:
        - Bitaxe
        - NerdQAxe
        - Canaan Avalon Nano 3s
        - Canaan Avalon Q
        - Braiins BMM 101
        - Other / not miner-specific
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Miner firmware version
      placeholder: e.g. AxeOS v2.7.0, BOSminer 23.04, Avalon Nano 25021401
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        On macOS: tail of `~/Library/Application Support/MinerWatch/data/logs/minerwatch.out.log`.
        On Linux: `journalctl --user -u minerwatch -n 200`.
        Please redact any subscription endpoints (urls under
        `https://fcm.googleapis.com/...` or similar).
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: pre-submit
    attributes:
      label: Pre-submit checks
      options:
        - label: I've redacted personal data (real MAC, public IP, push endpoints)
          required: true
        - label: I've searched existing issues and this is not a duplicate
          required: true
